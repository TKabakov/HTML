<!DOCTYPE html>
<html>
    <head>

    </head>
    <body>
        <h2>My First Java Script</h2>

        <button type="button"
        onclick="document.getElementById('demo').innerHTML=Date()">
        Click me to display Date and Time.
    </button>

    <p id="demo"></p>

    <h2>My Second JavaScript</h2>
    <p>JavaScript can change the content of an HTML element:</p>

    <button type="button" onclick="teoFuction()">Click Me!</button>
    
    <p id="demo2">This is a demonstration.</p>

    <script>
        function teoFuction(){
            document.getElementById("demo2").innerHTML="Hello JavaScript!";

        }
    </script>

    <h2>JavaScript can change the style of an HTML element.</h2>

    <p id="demo3">JavaScript can change the style of an HTML element.</p>

    <script>
        function styleChange(){
            document.getElementById("demo3").style.fontSize="25px";
            document.getElementById("demo3").style.color = "red";
            document.getElementById("demo3").style.backgroundColor = "yellow";
        }
    </script>

    <button type="button" onclick="styleChange()">Click Me!</button>
</body>
</html>
