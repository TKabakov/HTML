<!DOCTYPE html>
<html>
<head>
    <title>HTML Images</title>
</head>
<body>
    <h3>Exercise 1 - HTML imageformating</h3>
    <img src="images/favicon.png" width="250" height="400">
    <h3>Exercise 2 - CCS image formating</h3>
    <img src="images/favicon.png" style="width:250px; height:400px;">
    <h3>Exercise 3 - Image Link</h3>
    <a href="HTML Exercise Links.html"><img src="images/favicon.png"></a>
    <h3>Exercise 4 - Image Float</h3>
    <p>
        <img src="images/favicon.png" style="float:right;">
        This is a paragraph.
        This paragraph contains an image
    </p>
    <h3>Exercise 5 - Relative image address</h3>
        <img src="images/favicon.png">
    <h3>Exercise 6 - Image alternative text</h3>
        <img src="images/favicon.png" alt="Smiley">
</body>
</html>
