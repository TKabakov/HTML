<!DOCTYPE html>
<html>
    <head>
        <title>
            HTML Unordered List Style
        </title>
        <style>
            ul {
            list-style-type: none;
            margin: 10px;
            padding: 0;
            overflow: hidden;
            background-color: #333333;
            }
            li{
            float:left;
            padding: 10px;
            }
            li a {
            display: block;
            color: white;
            text-align: center;
            text-decoration: none;
            }
            li a:hover {
            background-color: #11111111;
            }
        </style>
    </head>
    <body>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#news">News</a></li>
            <li><a href="#contact">Conatact</a></li>
            <li><a href="#about">About</a></li>
        </ul>
    </body>
</html>
